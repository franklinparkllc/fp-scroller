<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Scroller</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Instrument+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg-deep: #0a0a0b;
      --bg-surface: #131316;
      --bg-elevated: #1a1a1f;
      --bg-hover: #222228;
      --border-subtle: rgba(255,255,255,0.06);
      --border-medium: rgba(255,255,255,0.1);
      --text-primary: #f0f0f2;
      --text-secondary: #8a8a96;
      --text-muted: #55555f;
      --accent: #6366f1;
      --accent-soft: rgba(99,102,241,0.15);
      --accent-glow: rgba(99,102,241,0.4);
      --red: #f43f5e;
      --red-soft: rgba(244,63,94,0.15);
      --editor-bg: #fafaf9;
      --editor-text: #2c2c30;
      --editor-border: #e8e8e6;
      --editor-label: #a0a09a;
      --radius-sm: 6px;
      --radius-md: 10px;
      --radius-lg: 14px;
      --radius-pill: 100px;
      --transition: 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    }

    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      display: flex;
      flex-direction: column;
      height: 100vh;
      background: var(--bg-deep);
      font-family: 'Instrument Sans', system-ui, sans-serif;
      color: var(--text-primary);
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ── Header ── */
    header {
      height: 44px;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 0 20px;
      background: var(--bg-surface);
      border-bottom: 1px solid var(--border-subtle);
    }

    header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.04em;
      color: var(--text-primary);
    }

    header span {
      font-size: 12px;
      font-weight: 400;
      color: var(--text-muted);
    }

    .workspace {
      flex: 1;
      display: flex;
      min-height: 0;
    }

    /* ── Editor Panel ── */
    .editor-panel {
      width: 34%;
      min-width: 260px;
      max-width: 480px;
      display: flex;
      flex-direction: column;
      background: var(--editor-bg);
      transition: width 0.3s var(--transition), min-width 0.3s var(--transition);
      position: relative;
      z-index: 2;
    }

    .editor-panel.collapsed {
      width: 0 !important;
      min-width: 0 !important;
    }

    .editor-inner {
      flex: 1;
      display: flex;
      flex-direction: column;
      overflow: hidden;
      min-height: 0;
    }

    .collapse-btn {
      position: absolute;
      right: -16px;
      top: 50%;
      transform: translateY(-50%);
      z-index: 20;
      width: 16px;
      height: 64px;
      background: var(--accent);
      border: none;
      border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.85);
      font-size: 11px;
      transition: background var(--transition), color var(--transition);
      user-select: none;
    }

    .collapse-btn:hover {
      background: #5558e6;
      color: #fff;
    }

    .editor-label {
      padding: 12px 20px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--editor-label);
      background: var(--editor-bg);
      border-bottom: 1px solid var(--editor-border);
      flex-shrink: 0;
    }

    #script-input {
      flex: 1;
      resize: none;
      border: none;
      outline: none;
      background: var(--editor-bg);
      color: var(--editor-text);
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      line-height: 1.65;
      padding: 16px 20px;
      caret-color: var(--accent);
    }

    #script-input::placeholder { color: #c4c4be; }
    #script-input:focus { background: #fff; }

    /* ── Prompter Panel ── */
    .prompter-panel {
      flex: 1;
      display: flex;
      flex-direction: column;
      background: var(--bg-deep);
      position: relative;
      overflow: hidden;
    }

    /* ── Controls ── */
    .prompter-controls {
      position: absolute;
      top: 0; left: 0; right: 0;
      z-index: 10;
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 10px 20px;
      background: linear-gradient(to bottom, rgba(10,10,11,0.92) 0%, rgba(10,10,11,0.75) 100%);
      backdrop-filter: blur(16px);
      -webkit-backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border-subtle);
    }

    #play-pause-btn {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 88px;
      background: var(--accent);
      color: #fff;
      border: none;
      border-radius: var(--radius-pill);
      padding: 8px 0;
      font-size: 12px;
      font-weight: 600;
      font-family: inherit;
      cursor: pointer;
      transition: background var(--transition), box-shadow var(--transition);
      user-select: none;
      flex-shrink: 0;
      letter-spacing: 0.01em;
    }

    #play-pause-btn:hover {
      background: #5558e6;
      box-shadow: 0 4px 16px var(--accent-glow);
    }

    #play-pause-btn:active {
      box-shadow: 0 2px 8px var(--accent-glow);
    }

    #play-pause-btn.playing {
      background: var(--red);
    }

    #play-pause-btn.playing:hover {
      background: #e63558;
      box-shadow: 0 4px 16px rgba(244,63,94,0.35);
    }

    .btn-icon {
      font-size: 10px;
      line-height: 1;
    }

    .btn-label {
      font-size: 12px;
    }

    .controls-divider {
      width: 1px;
      height: 22px;
      background: var(--border-medium);
      margin: 0 4px;
      flex-shrink: 0;
    }

    .control-group {
      display: flex;
      align-items: center;
      gap: 6px;
      padding: 6px 10px;
      background: rgba(255,255,255,0.04);
      border-radius: var(--radius-md);
      border: 1px solid var(--border-subtle);
      transition: border-color var(--transition);
    }

    .control-group:hover {
      border-color: var(--border-medium);
    }

    .control-label {
      font-size: 10px;
      font-weight: 600;
      color: var(--text-muted);
      letter-spacing: 0.05em;
      text-transform: uppercase;
      white-space: nowrap;
    }

    .slider-wrapper {
      display: flex;
      align-items: center;
      gap: 5px;
    }

    .slider-button {
      width: 22px;
      height: 22px;
      display: flex;
      align-items: center;
      justify-content: center;
      background: transparent;
      border: 1px solid var(--border-medium);
      border-radius: var(--radius-sm);
      color: var(--text-secondary);
      cursor: pointer;
      font-size: 13px;
      font-weight: 500;
      transition: all var(--transition);
      user-select: none;
      line-height: 1;
    }

    .slider-button:hover {
      background: var(--accent-soft);
      border-color: rgba(99,102,241,0.3);
      color: var(--text-primary);
    }

    .slider-button:active {
      transform: scale(0.92);
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      height: 3px;
      border-radius: 2px;
      background: rgba(255,255,255,0.1);
      outline: none;
      cursor: pointer;
      flex-shrink: 0;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 5px rgba(99,102,241,0.25);
      transform: scale(1.15);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: var(--accent);
      cursor: pointer;
      border: none;
      box-shadow: 0 0 0 3px rgba(99,102,241,0.15);
      transition: all var(--transition);
    }

    input[type="range"]::-moz-range-thumb:hover {
      box-shadow: 0 0 0 5px rgba(99,102,241,0.25);
      transform: scale(1.15);
    }

    #speed-slider { width: 90px; }
    #font-size-slider { width: 80px; }

    .control-value {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      font-family: 'JetBrains Mono', monospace;
      width: 32px;
      text-align: right;
      flex-shrink: 0;
    }

    /* ── Prompter Viewport ── */
    .prompter-panel::after {
      content: '';
      position: absolute;
      left: 0; right: 0;
      bottom: 0;
      height: 120px;
      background: linear-gradient(to top, var(--bg-deep) 10%, transparent);
      pointer-events: none;
      z-index: 4;
    }

    .prompter-panel::before {
      content: '';
      position: absolute;
      left: 0; right: 0;
      top: 48px;
      height: 60px;
      background: linear-gradient(to bottom, var(--bg-deep) 0%, transparent);
      pointer-events: none;
      z-index: 5;
    }

    .prompter-viewport {
      flex: 1;
      overflow: hidden;
      position: relative;
      cursor: pointer;
      padding: 72px 10% 0;
    }

    .prompter-text {
      font-family: 'Instrument Sans', system-ui, sans-serif;
      font-size: 48px;
      font-weight: 500;
      line-height: 1.55;
      color: var(--text-primary);
      white-space: pre-wrap;
      word-break: break-word;
      transform: translateY(0px);
      will-change: transform;
      padding-bottom: 60vh;
      user-select: none;
      letter-spacing: -0.01em;
    }

    .prompter-empty {
      color: var(--text-muted);
      font-style: italic;
      font-size: 22px;
      font-weight: 400;
    }

  </style>
</head>
<body>

<header>
  <h1>SCROLLER</h1>
  <span>/</span>
  <span>the dumb teleprompter you never knew you wanted</span>
</header>

<main class="workspace">

  <section class="editor-panel" id="editor-panel">
    <div class="editor-inner">
      <div class="editor-label">Script</div>
      <textarea id="script-input" placeholder="Paste or type your script here..." spellcheck="false"></textarea>
    </div>
    <button class="collapse-btn" id="collapse-btn" title="Collapse panel">&#8249;</button>
  </section>

  <section class="prompter-panel" id="prompter-panel">
    <div class="prompter-controls">
      <button id="play-pause-btn">
        <span class="btn-icon">&#9654;</span>
        <span class="btn-label">Play</span>
      </button>

      <div class="controls-divider"></div>

      <div class="control-group">
        <span class="control-label">Speed</span>
        <div class="slider-wrapper">
          <button class="slider-button" id="speed-decrease" title="Decrease speed">&minus;</button>
          <input type="range" id="speed-slider" min="1" max="10" value="5">
          <button class="slider-button" id="speed-increase" title="Increase speed">+</button>
        </div>
        <span class="control-value" id="speed-value">5</span>
      </div>

      <div class="control-group">
        <span class="control-label">Size</span>
        <div class="slider-wrapper">
          <button class="slider-button" id="size-decrease" title="Decrease size">&minus;</button>
          <input type="range" id="font-size-slider" min="40" max="96" value="48" step="8">
          <button class="slider-button" id="size-increase" title="Increase size">+</button>
        </div>
        <span class="control-value" id="font-size-value">48px</span>
      </div>
    </div>

    <div class="prompter-viewport" id="prompter-viewport">
      <div class="prompter-text prompter-empty" id="prompter-text">Paste your script on the left...</div>
    </div>
  </section>

</main>

<script>
  // ── DOM refs ──
  const scriptInput     = document.getElementById('script-input');
  const prompterText    = document.getElementById('prompter-text');
  const prompterViewport= document.getElementById('prompter-viewport');
  const prompterPanel   = document.getElementById('prompter-panel');
  const playPauseBtn    = document.getElementById('play-pause-btn');
  const btnIcon         = playPauseBtn.querySelector('.btn-icon');
  const btnLabel        = playPauseBtn.querySelector('.btn-label');
  const speedSlider     = document.getElementById('speed-slider');
  const speedValue      = document.getElementById('speed-value');
  const fontSizeSlider  = document.getElementById('font-size-slider');
  const fontSizeValue   = document.getElementById('font-size-value');

  // ── State ──
  const state = {
    isPlaying:     false,
    scrollY:       0,
    speed:         5,
    fontSize:      48,
    rafId:         null,
    lastTimestamp: null,
    text:          'Lorem ipsum dolor sit amet, consectetur adipiscing elit. Sed do eiusmod tempor incididunt ut labore et dolore magna aliqua. Ut enim ad minim veniam, quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat. Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur. Excepteur sint occaecat cupidatat non proident, sunt in culpa qui officia deserunt mollit anim id est laborum.\nSed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium, totam rem aperiam, eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo. Nemo enim ipsam voluptatem quia voluptas sit aspernatur aut odit aut fugit, sed quia consequuntur magni dolores eos qui ratione voluptatem sequi nesciunt. Neque porro quisquam est, qui dolorem ipsum quia dolor sit amet, consectetur, adipisci velit, sed quia non numquam eius modi tempora incidunt ut labore et dolore magnam aliquam quaerat voluptatem.',
    atEnd:         false,
  };

  // ── Hidden mirror div for textarea caret position mapping ──
  const textMirror = document.createElement('div');
  Object.assign(textMirror.style, {
    position:    'absolute',
    visibility:  'hidden',
    pointerEvents: 'none',
    top:         '-9999px',
    left:        '0',
    fontFamily:  "'JetBrains Mono', monospace",
    fontSize:    '13px',
    lineHeight:  '1.65',
    whiteSpace:  'pre-wrap',
    wordBreak:   'break-word',
    padding:     '16px 20px',
  });
  document.body.appendChild(textMirror);

  function updateMirrorWidth() {
    textMirror.style.width = scriptInput.offsetWidth + 'px';
  }

  // ── Speed mapping ──
  function speedToPxPerSecond(v) {
    return Math.round(3.51 * Math.pow(v, 1.5));
  }

  // ── Scroll application ──
  function applyScroll() {
    prompterText.style.transform = `translateY(${state.scrollY}px)`;
  }

  function maxScroll() {
    const textH     = prompterText.offsetHeight;
    const viewH     = prompterViewport.offsetHeight;
    const readingY  = viewH * 0.38;
    return -(textH - readingY);
  }

  // ── rAF loop ──
  function tick(timestamp) {
    if (!state.isPlaying) return;

    if (state.lastTimestamp !== null) {
      const delta   = timestamp - state.lastTimestamp;
      const pxPerMs = speedToPxPerSecond(state.speed) / 1000;
      state.scrollY -= delta * pxPerMs;

      const limit = maxScroll();
      if (state.scrollY <= limit) {
        state.scrollY = limit;
        applyScroll();
        pauseScrolling();
        state.atEnd = true;
        return;
      }
    }

    state.lastTimestamp = timestamp;
    applyScroll();
    state.rafId = requestAnimationFrame(tick);
  }

  // ── Play / Pause ──
  function playScrolling() {
    if (state.atEnd) {
      state.scrollY  = 0;
      state.atEnd    = false;
      applyScroll();
    }
    state.isPlaying    = true;
    state.lastTimestamp = null;
    btnIcon.textContent  = '\u23F8';
    btnLabel.textContent = 'Pause';
    playPauseBtn.classList.add('playing');
    state.rafId = requestAnimationFrame(tick);
  }

  function pauseScrolling() {
    state.isPlaying = false;
    cancelAnimationFrame(state.rafId);
    state.rafId     = null;
    btnIcon.textContent  = '\u25B6';
    btnLabel.textContent = 'Play';
    playPauseBtn.classList.remove('playing');
  }

  function togglePlayPause() {
    state.isPlaying ? pauseScrolling() : playScrolling();
  }

  // ── Render prompter text ──
  function renderPrompterText() {
    const totalBefore = prompterText.offsetHeight || 1;
    const ratio       = Math.abs(state.scrollY) / totalBefore;

    if (state.text.trim() === '') {
      prompterText.textContent = 'Paste your script on the left\u2026';
      prompterText.classList.add('prompter-empty');
    } else {
      prompterText.textContent = state.text;
      prompterText.classList.remove('prompter-empty');
    }

    requestAnimationFrame(() => {
      const totalAfter  = prompterText.offsetHeight;
      state.scrollY     = -(ratio * totalAfter);
      const limit       = maxScroll();
      state.scrollY     = Math.max(state.scrollY, limit);
      state.scrollY     = Math.min(state.scrollY, 0);
      applyScroll();
    });
  }

  // ── Area 2 click: seek + pause ──
  prompterViewport.addEventListener('click', (e) => {
    const vpRect   = prompterViewport.getBoundingClientRect();
    const textRect = prompterText.getBoundingClientRect();
    const clickY   = e.clientY - vpRect.top;
    const textY    = e.clientY - textRect.top;

    const centerY     = prompterViewport.offsetHeight * 0.5;
    state.scrollY     = centerY - textY;
    state.scrollY     = Math.min(state.scrollY, 0);
    const limit       = maxScroll();
    state.scrollY     = Math.max(state.scrollY, limit);

    applyScroll();
    pauseScrolling();
    state.atEnd = false;
  });

  // ── Area 1 click: sync prompter to caret position ──
  scriptInput.addEventListener('click', syncPrompterToTextareaClick);
  scriptInput.addEventListener('keyup', (e) => {
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight','Home','End'].includes(e.key)) {
      syncPrompterToTextareaClick();
    }
  });

  function syncPrompterToTextareaClick() {
    if (state.text.trim() === '') return;

    const caretPos  = scriptInput.selectionStart;
    const textBefore = state.text.substring(0, caretPos);

    updateMirrorWidth();

    textMirror.textContent = textBefore;
    const heightBefore = textMirror.offsetHeight;

    textMirror.textContent = state.text;
    const heightFull   = textMirror.offsetHeight;

    if (heightFull === 0) return;

    const ratio      = heightBefore / heightFull;
    const targetY    = ratio * prompterText.offsetHeight;
    const centerY    = prompterViewport.offsetHeight * 0.5;

    state.scrollY    = centerY - targetY;
    state.scrollY    = Math.min(state.scrollY, 0);
    const limit      = maxScroll();
    state.scrollY    = Math.max(state.scrollY, limit);

    applyScroll();
  }

  // ── Input: live text update ──
  scriptInput.addEventListener('input', () => {
    state.text = scriptInput.value;
    state.atEnd = false;
    renderPrompterText();
  });

  // ── Speed slider ──
  speedSlider.addEventListener('input', () => {
    state.speed = parseInt(speedSlider.value);
    speedValue.textContent = state.speed;
  });

  // ── Font size slider ──
  fontSizeSlider.addEventListener('input', () => {
    state.fontSize = parseInt(fontSizeSlider.value);
    fontSizeValue.textContent = state.fontSize + 'px';
    prompterText.style.fontSize   = state.fontSize + 'px';
    prompterText.style.lineHeight = (state.fontSize * 1.55) + 'px';
    renderPrompterText();
  });

  // ── Play/Pause button ──
  playPauseBtn.addEventListener('click', togglePlayPause);

  // ── Keyboard shortcuts ──
  document.addEventListener('keydown', (e) => {
    if (document.activeElement === scriptInput) return;
    if (e.code === 'Space') {
      e.preventDefault();
      togglePlayPause();
    }
    if (e.code === 'ArrowUp') {
      e.preventDefault();
      state.scrollY = Math.min(0, state.scrollY + 80);
      applyScroll();
    }
    if (e.code === 'ArrowDown') {
      e.preventDefault();
      const limit = maxScroll();
      state.scrollY = Math.max(limit, state.scrollY - 80);
      applyScroll();
    }
  });

  // ── Resize observer ──
  if (window.ResizeObserver) {
    new ResizeObserver(updateMirrorWidth).observe(scriptInput);
  }

  // ── Collapse toggle ──
  const editorPanel = document.getElementById('editor-panel');
  const collapseBtn = document.getElementById('collapse-btn');

  collapseBtn.addEventListener('click', () => {
    const isCollapsed = editorPanel.classList.toggle('collapsed');
    collapseBtn.innerHTML = isCollapsed ? '&#8250;' : '&#8249;';
    collapseBtn.title = isCollapsed ? 'Expand panel' : 'Collapse panel';
    setTimeout(updateMirrorWidth, 320);
  });

  // ── Slider buttons ──
  const speedDecrease = document.getElementById('speed-decrease');
  const speedIncrease = document.getElementById('speed-increase');
  const sizeDecrease = document.getElementById('size-decrease');
  const sizeIncrease = document.getElementById('size-increase');

  speedDecrease.addEventListener('click', () => {
    state.speed = Math.max(1, state.speed - 1);
    speedSlider.value = state.speed;
    speedValue.textContent = state.speed;
  });

  speedIncrease.addEventListener('click', () => {
    state.speed = Math.min(10, state.speed + 1);
    speedSlider.value = state.speed;
    speedValue.textContent = state.speed;
  });

  sizeDecrease.addEventListener('click', () => {
    state.fontSize = Math.max(40, state.fontSize - 8);
    fontSizeSlider.value = state.fontSize;
    fontSizeValue.textContent = state.fontSize + 'px';
    prompterText.style.fontSize = state.fontSize + 'px';
    prompterText.style.lineHeight = (state.fontSize * 1.55) + 'px';
    renderPrompterText();
  });

  sizeIncrease.addEventListener('click', () => {
    state.fontSize = Math.min(96, state.fontSize + 8);
    fontSizeSlider.value = state.fontSize;
    fontSizeValue.textContent = state.fontSize + 'px';
    prompterText.style.fontSize = state.fontSize + 'px';
    prompterText.style.lineHeight = (state.fontSize * 1.55) + 'px';
    renderPrompterText();
  });

  // ── Init ──
  updateMirrorWidth();
  scriptInput.value = state.text;
  renderPrompterText();
</script>

</body>
</html>
